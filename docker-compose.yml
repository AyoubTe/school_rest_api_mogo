services:
  mongodb:
    image: mongo:7.0
    container_name: school_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: springstudent
      MONGO_INITDB_ROOT_PASSWORD: springstudent
      MONGO_INITDB_DATABASE: school_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init_v1.js:ro

  mongo-express:
    image: mongo-express:1.0.2
    container_name: school_mongo_ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: springstudent
      ME_CONFIG_MONGODB_ADMINPASSWORD: springstudent
      ME_CONFIG_MONGODB_URL: mongodb://springstudent:springstudent@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

volumes:
  mongo_data: